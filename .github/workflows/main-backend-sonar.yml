name: Backend Main - Sonar Analysis

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/main-backend-sonar.yml'
  workflow_dispatch:

jobs:
  backend-sonar:
    name: Backend Sonar Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Sonar packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-sonar-

      - name: Run tests with coverage and Sonar Scanner
        run: mvn -B clean verify sonar:sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}