name: AI Service Eval

on:
  workflow_dispatch:

jobs:
  eval:
    name: Run ADK evaluation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start dependencies (postgres, backend, toolbox)
        run: |
          docker compose up -d postgres backend toolbox --build
          echo "Waiting for backend..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; do sleep 3; done'
          echo "Backend is up."

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install ai-service dependencies
        working-directory: ./ai-service
        run: uv sync --group dev

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull models
        run: |
          ollama serve &
          sleep 5
          ollama pull qwen2.5:1.5b
          ollama pull qwen3:8b

      - name: Run ADK evaluation
        working-directory: ./ai-service
        run: uv run adk eval --config_file_path app/eval/eval_config.json app app/eval/sampleDataset.evalset.json