name: AI Service Eval

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to evaluate"
        required: true
        type: string

jobs:
  changes:
    name: Detect AI service changes
    runs-on: ubuntu-latest
    
    outputs:
      ai-service: ${{ steps.filter.outputs.ai-service }}

    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.inputs.pr_number }}/merge
          fetch-depth: 0

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ai-service:
              - 'ai-service/**'
              - '.github/workflows/ai-service-eval.yml'

  eval:
    name: Run ADK evaluation
    needs: changes
    if: needs.changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.inputs.pr_number }}/merge

      - name: Start dependencies (postgres, backend, toolbox)
        run: |
          docker compose up -d postgres backend toolbox --build
          echo "Waiting for backend..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; do sleep 3; done'
          echo "Backend is up."

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install ai-service dependencies
        working-directory: ./ai-service
        run: uv sync --group dev

      - name: Run ADK evaluation
        working-directory: ./ai-service
        env:
          MODEL_NAME: openrouter/qwen/qwen3-8b
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run pytest app/eval/test_agent_eval.py