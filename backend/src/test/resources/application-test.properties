# ========== CACHE ==========
spring.cache.type=none

# ========== SCHEDULER ==========
spring.task.scheduling.enabled=false
scheduler.distribution.cron=-

# ========== ACTUATOR ==========
management.endpoints.enabled-by-default=false
management.endpoints.web.exposure.include=

# ========== TESTCONTAINERS (JDBC URL) ==========
spring.datasource.url=jdbc:tc:postgresql:16-alpine:///testdb

# ========== JPA ==========
spring.jpa.hibernate.ddl-auto=validate

# ========== FRONTEND ==========
app.frontend.url=http://localhost:4200

# ========== DATA ==========
data.products.url=https://raw.githubusercontent.com/raulHerediaHorcajo/product-distribution/main/data/test/products.json
data.stores.url=https://raw.githubusercontent.com/raulHerediaHorcajo/product-distribution/main/data/test/stores.json
data.warehouses.url=https://raw.githubusercontent.com/raulHerediaHorcajo/product-distribution/main/data/test/warehouses.json