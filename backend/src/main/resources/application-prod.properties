spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}?sslmode=require&reWriteBatchedInserts=true
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Configuration (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Batch Configuration for performance
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false

server.address=0.0.0.0

app.frontend.url=${APP_FRONTEND_URL}

data.products.url=${DATA_PRODUCTS_URL:https://raw.githubusercontent.com/raulHerediaHorcajo/product-distribution-ai/main/data/current/products.json}
data.stores.url=${DATA_STORES_URL:https://raw.githubusercontent.com/raulHerediaHorcajo/product-distribution-ai/main/data/current/stores.json}
data.warehouses.url=${DATA_WAREHOUSES_URL:https://raw.githubusercontent.com/raulHerediaHorcajo/product-distribution-ai/main/data/current/warehouses.json}

scheduler.distribution.cron=${SCHEDULER_DISTRIBUTION_CRON:0 0 2 * * *}