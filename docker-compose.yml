services:
  postgres:
    image: postgres:16-alpine
    container_name: product-distribution-ai-postgres
    environment:
      POSTGRES_DB: product_distribution_ai_db
      POSTGRES_USER: product_distribution_ai
      POSTGRES_PASSWORD: product_distribution_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U product_distribution_ai -d product_distribution_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: product-distribution-ai-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/product_distribution_ai_db
      SPRING_DATASOURCE_USERNAME: product_distribution_ai
      SPRING_DATASOURCE_PASSWORD: product_distribution_ai
      APP_FRONTEND_URL: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: product-distribution-ai-frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: